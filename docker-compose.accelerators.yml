version: '3.8'

networks:
  cahack-network:
    driver: bridge

services:
  # Accelerator 001: BenefitsCal Navigator
  accel-001-backend:
    build:
      context: ./accelerators/001-benefitscal-navigator/backend
    ports:
      - "8001:8000"
    environment:
      - USE_MOCK_SERVICES=true
      - AZURE_OPENAI_ENDPOINT=
      - AZURE_OPENAI_DEPLOYMENT=gpt-4o
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cahack-network

  accel-001-frontend:
    build:
      context: ./accelerators/001-benefitscal-navigator/frontend
    ports:
      - "3001:80"
    environment:
      - BACKEND_URL=http://accel-001-backend:8000
    depends_on:
      accel-001-backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cahack-network

  # Accelerator 002: Wildfire Response Coordinator

# Azure Developer CLI (azd) configuration for CA Hackathon Accelerators
# Run `azd up` to provision and deploy the solution

name: ca-hackathon-accelerators
metadata:
  template: ca-hackathon-accelerators@1.0.0

services:
  backend:
    project: ./backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  frontend:
    project: ./frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-001:
    project: ./accelerators/001-benefitscal-navigator/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-001-fe:
    project: ./accelerators/001-benefitscal-navigator/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-002:
    project: ./accelerators/002-wildfire-response-coordinator/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-002-fe:
    project: ./accelerators/002-wildfire-response-coordinator/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-003:
    project: ./accelerators/003-medi-cal-eligibility/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-003-fe:
    project: ./accelerators/003-medi-cal-eligibility/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-004:
    project: ./accelerators/004-permit-streamliner/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-004-fe:
    project: ./accelerators/004-permit-streamliner/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-005:
    project: ./accelerators/005-genai-procurement-compliance/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-006:
    project: ./accelerators/006-cross-agency-knowledge-hub/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-006-fe:
    project: ./accelerators/006-cross-agency-knowledge-hub/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

  accel-007:
    project: ./accelerators/007-edd-claims-assistant/backend
    language: python
    host: containerapp
    docker:
      path: Dockerfile

  accel-007-fe:
    project: ./accelerators/007-edd-claims-assistant/frontend
    language: js
    host: containerapp

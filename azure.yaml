  accel-008-fe:
    project: ./accelerators/008-multilingual-emergency-chat/frontend
    language: js
    host: containerapp
    docker:
      path: Dockerfile

# Azure infrastructure
infra:
  provider: bicep
  path: ./infra
  module: main

# Pipeline configuration for CI/CD
pipeline:
  provider: github

# Hooks for deployment lifecycle
hooks:
  preprovision:
    shell: sh
    run: echo "🚀 Provisioning CA Hackathon accelerator infrastructure..."
    interactive: false
  postprovision:
    shell: sh
    run: echo "✅ Infrastructure provisioned. Run 'azd deploy' to deploy services."
    interactive: false
  postdeploy:
    shell: sh
    run: |
      echo ""
      echo "=========================================="
      echo "🎉 CA Hackathon Deployment Complete!"
      echo "=========================================="
      echo "Platform Frontend: ${AZURE_FRONTEND_URL}"
      echo "Platform Backend:  ${AZURE_CONTAINERAPP_URL}"
      echo "Backend Health:    ${AZURE_CONTAINERAPP_URL}/api/health"
      echo "=========================================="
    interactive: false
